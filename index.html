<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VidDrop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#17171f;
  --border:rgba(255,255,255,0.07); --accent:#7c6bff; --accent2:#ff6b9d;
  --text:#f0eeff; --muted:#6b6880; --success:#4dffa6; --error:#ff6b6b; --warn:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh; overflow-x:hidden;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(124,107,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,107,255,0.025) 1px,transparent 1px);
  background-size:50px 50px; z-index:0; pointer-events:none;
}
.glow{
  position:fixed;border-radius:50%;filter:blur(100px);opacity:0.1;z-index:0;pointer-events:none;
  animation:drift 14s ease-in-out infinite alternate;
}
.glow.a{width:500px;height:500px;background:var(--accent);top:-150px;left:-100px}
.glow.b{width:400px;height:400px;background:var(--accent2);bottom:-150px;right:-80px;animation-delay:-7s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(30px,20px)}}

.wrap{
  position:relative;z-index:1;
  max-width:600px;margin:0 auto;
  padding:48px 20px 80px;
}

.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:44px;
  letter-spacing:-2px;text-align:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:up 0.6s ease both;
}
.sub{text-align:center;font-size:13px;color:var(--muted);margin-top:8px;animation:up 0.6s 0.08s ease both}
.badges{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:12px;animation:up 0.6s 0.14s ease both}
.badge{padding:3px 10px;border-radius:100px;font-size:10px;border:1px solid var(--border);color:var(--muted)}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:24px;margin-top:32px;
  animation:up 0.6s 0.2s ease both;
}

.input-wrap{display:flex;gap:10px}
.url-input{
  flex:1;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);
  border-radius:12px;padding:14px 16px;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;
  transition:border-color 0.2s,background 0.2s;
  -webkit-appearance:none;
}
.url-input::placeholder{color:var(--muted)}
.url-input:focus{border-color:var(--accent);background:rgba(124,107,255,0.05)}

.go-btn{
  background:linear-gradient(135deg,var(--accent),#9b56ff);
  border:none;border-radius:12px;padding:14px 22px;
  color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;white-space:nowrap;
  box-shadow:0 0 24px rgba(124,107,255,0.3);
  transition:opacity 0.15s,transform 0.15s;
  -webkit-appearance:none;
}
.go-btn:active{opacity:0.8;transform:scale(0.97)}
.go-btn:disabled{opacity:0.4;cursor:not-allowed}

.platform-pill{
  display:none;align-items:center;gap:8px;
  margin-top:14px;padding:10px 14px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;
}
.platform-pill.show{display:flex}
.p-emoji{font-size:18px}
.p-name{font-size:13px;font-weight:500}
.p-desc{font-size:11px;color:var(--muted);margin-top:1px}

.options{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.opt-group{flex:1;min-width:120px}
.opt-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:5px}
select{
  width:100%;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);
  border-radius:10px;padding:9px 12px;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;
  appearance:none;cursor:pointer;transition:border-color 0.2s;
}
select:focus{border-color:var(--accent)}

.progress-area{margin-top:20px;display:none;animation:up 0.3s ease both}
.progress-area.show{display:block}

.stage-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--muted);margin-bottom:8px;
}
.stage-label .pct{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--accent)}

.bar-track{height:6px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.bar-fill{
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;transition:width 0.4s ease;
}
.bar-fill.success{background:linear-gradient(90deg,#4dffa6,#00e5ff)}
.bar-fill.error{background:linear-gradient(90deg,var(--error),#ff9b6b)}

.server-log{margin-top:12px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.log-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:8px;
  background:rgba(255,255,255,0.025);
  font-size:11px;color:var(--muted);
  border:1px solid transparent;transition:all 0.25s;
}
.log-item.trying{border-color:rgba(124,107,255,0.3);color:var(--text);background:rgba(124,107,255,0.08)}
.log-item.ok{border-color:rgba(77,255,166,0.25);color:var(--success);background:rgba(77,255,166,0.06)}
.log-item.fail{border-color:rgba(255,107,107,0.2);color:var(--error);background:rgba(255,107,107,0.04)}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.log-item.trying .log-dot{background:var(--accent);animation:pulse 1s infinite}
.log-item.ok .log-dot{background:var(--success)}
.log-item.fail .log-dot{background:var(--error)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.result-area{margin-top:16px;display:none;animation:up 0.4s ease both}
.result-area.show{display:block}

.result-box{
  background:rgba(77,255,166,0.06);border:1px solid rgba(77,255,166,0.2);
  border-radius:14px;padding:18px 20px;
}
.result-title{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--success);margin-bottom:12px}
.dl-link{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(77,255,166,0.15);border-radius:10px;
  text-decoration:none;color:var(--text);
  margin-bottom:8px;transition:background 0.2s;
}
.dl-link:last-child{margin-bottom:0}
.dl-link:active{background:rgba(255,255,255,0.08)}
.dl-icon{font-size:20px;flex-shrink:0}
.dl-info{flex:1;min-width:0}
.dl-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-meta{font-size:11px;color:var(--muted);margin-top:2px}
.dl-btn-pill{
  background:linear-gradient(135deg,#4dffa6,#00e5ff);
  color:#000;font-family:'Syne',sans-serif;font-weight:700;
  font-size:11px;padding:7px 14px;border-radius:100px;
  white-space:nowrap;flex-shrink:0;
}

.error-box{
  background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.2);
  border-radius:14px;padding:18px 20px;
}
.error-title{font-size:13px;font-weight:500;color:var(--error);margin-bottom:8px}
.error-sub{font-size:12px;color:var(--muted);line-height:1.6}

.fallback-section{margin-top:20px;display:none;animation:up 0.4s ease both}
.fallback-section.show{display:block}
.fallback-title{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:10px}
.fallback-grid{display:flex;flex-direction:column;gap:6px}
.fb-card{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  text-decoration:none;color:var(--text);cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
}
.fb-card:active{background:rgba(255,255,255,0.05);border-color:rgba(124,107,255,0.3)}
.fb-icon{font-size:18px;flex-shrink:0}
.fb-name{flex:1;font-size:13px}
.fb-arrow{color:var(--muted);font-size:13px}

@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.server-log::-webkit-scrollbar{width:3px}
.server-log::-webkit-scrollbar-track{background:transparent}
.server-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow a"></div>
<div class="glow b"></div>

<div class="wrap">
  <div class="logo">VidDrop</div>
  <div class="sub">自動嘗試所有伺服器，找到就下載</div>
  <div class="badges">
    <span class="badge">YouTube</span><span class="badge">Instagram</span>
    <span class="badge">TikTok</span><span class="badge">Facebook</span>
    <span class="badge">Threads</span><span class="badge">Twitter/X</span>
  </div>

  <div class="card">
    <div class="input-wrap">
      <input type="url" id="urlInput" class="url-input"
        placeholder="貼上影片連結…" autocomplete="off" spellcheck="false">
      <button class="go-btn" id="goBtn" onclick="startDownload()">下載</button>
    </div>

    <div class="platform-pill" id="platformPill">
      <span class="p-emoji" id="pEmoji"></span>
      <div><div class="p-name" id="pName"></div><div class="p-desc" id="pDesc"></div></div>
    </div>

    <div class="options">
      <div class="opt-group">
        <div class="opt-label">畫質</div>
        <select id="quality">
          <option value="max">最高畫質</option>
          <option value="1080" selected>1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="360">360p</option>
        </select>
      </div>
      <div class="opt-group">
        <div class="opt-label">格式</div>
        <select id="format">
          <option value="auto">自動</option>
          <option value="mp4">MP4</option>
          <option value="audio">僅音訊</option>
        </select>
      </div>
    </div>

    <div class="progress-area" id="progressArea">
      <div class="stage-label">
        <span id="stageText">準備中…</span>
        <span class="pct" id="pctText">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <div class="server-log" id="serverLog"></div>
    </div>

    <div class="result-area" id="resultArea"></div>
  </div>

  <div class="fallback-section" id="fallbackSection">
    <div class="fallback-title">⚡ 備用服務（手動開啟）</div>
    <div class="fallback-grid" id="fallbackGrid"></div>
  </div>
</div>

<script>
// cobalt API 全線中斷（2026/04），改用直接轉址備用服務

const PLATFORMS = [
  {key:'youtube',  re:/youtube\.com|youtu\.be/,  name:'YouTube',   emoji:'▶️', desc:'支援最高 4K 畫質'},
  {key:'instagram',re:/instagram\.com/,          name:'Instagram', emoji:'📸',desc:'Reels、貼文、限時動態'},
  {key:'tiktok',   re:/tiktok\.com/,             name:'TikTok',    emoji:'🎵',desc:'支援去除浮水印'},
  {key:'facebook', re:/facebook\.com|fb\.watch/, name:'Facebook',  emoji:'📘',desc:'公開影片'},
  {key:'threads',  re:/threads\.net/,            name:'Threads',   emoji:'🧵',desc:'影片貼文'},
  {key:'twitter',  re:/twitter\.com|x\.com/,    name:'Twitter/X', emoji:'🐦',desc:'影片、GIF'},
  {key:'twitch',   re:/twitch\.tv/,             name:'Twitch',    emoji:'🟣',desc:'Clips、VOD'},
  {key:'reddit',   re:/reddit\.com/,            name:'Reddit',    emoji:'🔴',desc:'影片貼文'},
];

const enc = encodeURIComponent;
const FALLBACKS = [
  {name:'VD6S (YouTube推薦)', icon:'🌐',platforms:['youtube','facebook','instagram','tiktok'],fn:u=>`https://vd6s.net/en5/?url=${enc(u)}`},
  {name:'SnapSave',           icon:'📷',platforms:['facebook','instagram','tiktok'],fn:u=>`https://snapsave.app/?url=${enc(u)}`},
  {name:'cobalt.tools (網頁)',icon:'🔷',platforms:['youtube','instagram','tiktok','facebook','threads','twitter'],fn:u=>`https://cobalt.tools/#${enc(u)}`},
  {name:'ThreadsDownloader',  icon:'🧵',platforms:['threads'],fn:u=>`https://threadsdownloader.com/?url=${enc(u)}`},
  {name:'FSave',              icon:'📘',platforms:['facebook'],fn:u=>`https://fsave.io/?url=${enc(u)}`},
  {name:'FDownloader',        icon:'⬇️',platforms:['facebook','instagram'],fn:u=>`https://fdownloader.net/zh-tw?url=${enc(u)}`},
  {name:'sssInstagram',       icon:'📸',platforms:['instagram'],fn:u=>`https://sssinstagram.com/?url=${enc(u)}`},
  {name:'TikMate',            icon:'🎵',platforms:['tiktok'],fn:u=>`https://tikmate.online/?url=${enc(u)}`},
  {name:'Y2Mate',             icon:'▶️',platforms:['youtube'],fn:u=>`https://www.y2mate.com/youtube/${enc(u)}`},
  {name:'VD6S',               icon:'🌐',platforms:['youtube','facebook','instagram','tiktok'],fn:u=>`https://vd6s.net/en5/?url=${enc(u)}`},
];

let running = false;
let logItems = {};

function detectPlatform(url) {
  for (const p of PLATFORMS) if (p.re.test(url)) return p;
  return null;
}

function setBar(pct, state='') {
  const fill = document.getElementById('barFill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill' + (state ? ' '+state : '');
  document.getElementById('pctText').textContent = Math.round(pct) + '%';
}
function setStage(msg) { document.getElementById('stageText').textContent = msg; }

function addLog(id, name) {
  const log = document.getElementById('serverLog');
  const div = document.createElement('div');
  div.className = 'log-item trying';
  div.id = 'log_'+id;
  div.innerHTML = `<div class="log-dot"></div><span>嘗試：${name}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  logItems[id] = div;
}
function updateLog(id, state, msg) {
  const el = logItems[id];
  if (!el) return;
  el.className = 'log-item '+state;
  el.querySelector('span').textContent = msg;
}

function showResult(data, url) {
  const area = document.getElementById('resultArea');
  const platform = detectPlatform(url);
  const isAudio = document.getElementById('format').value === 'audio';
  let html = `<div class="result-box"><div class="result-title">✦ 下載連結就緒</div>`;
  if (data.status === 'stream' || data.status === 'redirect') {
    html += makeLink(data.url, isAudio ? '音訊檔案' : `${platform?.name||'影片'}`, isAudio?'🎵':'🎬');
  } else if (data.status === 'picker') {
    data.picker.forEach((p,i) => html += makeLink(p.url, `媒體 ${i+1}`, p.type==='photo'?'🖼️':'🎬'));
    if (data.audio) html += makeLink(data.audio, '背景音樂', '🎵');
  }
  html += `</div>`;
  area.innerHTML = html;
  area.className = 'result-area show';
}

function makeLink(url, name, icon) {
  return `<a class="dl-link" href="${url}" target="_blank" rel="noopener">
    <div class="dl-icon">${icon}</div>
    <div class="dl-info"><div class="dl-name">${name}</div><div class="dl-meta">點擊在新分頁開啟下載</div></div>
    <div class="dl-btn-pill">下載 ↓</div>
  </a>`;
}

function showError(msg) {
  const area = document.getElementById('resultArea');
  area.innerHTML = `<div class="error-box">
    <div class="error-title">⚠ 所有伺服器均失敗</div>
    <div class="error-sub">${msg}<br>請使用下方備用服務手動下載。</div>
  </div>`;
  area.className = 'result-area show';
}

function renderFallbacks(url) {
  const platform = detectPlatform(url);
  let services = FALLBACKS;
  if (platform) {
    services = [...FALLBACKS.filter(s=>s.platforms.includes(platform.key)),
                ...FALLBACKS.filter(s=>!s.platforms.includes(platform.key))];
  }
  document.getElementById('fallbackGrid').innerHTML = services.map(s => {
    const dim = platform && !s.platforms.includes(platform.key) ? 'opacity:0.4;' : '';
    return `<a class="fb-card" style="${dim}" href="${s.fn(url)}" target="_blank" rel="noopener">
      <span class="fb-icon">${s.icon}</span><span class="fb-name">${s.name}</span><span class="fb-arrow">↗</span>
    </a>`;
  }).join('');
  document.getElementById('fallbackSection').className = 'fallback-section show';
}

// 依平台選出最佳備用服務清單（排序過）
function getBestServices(url) {
  const platform = detectPlatform(url);
  if (!platform) return FALLBACKS;
  return [
    ...FALLBACKS.filter(s => s.platforms.includes(platform.key)),
    ...FALLBACKS.filter(s => !s.platforms.includes(platform.key)),
  ];
}

async function startDownload() {
  if (running) return;
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('請先貼上影片連結'); return; }
  try { new URL(url); } catch { alert('連結格式不正確'); return; }

  running = true;
  document.getElementById('goBtn').disabled = true;
  document.getElementById('resultArea').className = 'result-area';
  document.getElementById('fallbackSection').className = 'fallback-section';
  document.getElementById('serverLog').innerHTML = '';
  logItems = {};

  document.getElementById('progressArea').className = 'progress-area show';

  const services = getBestServices(url);
  const total = services.length;

  // 模擬進度條，逐一展示可用服務
  for (let i = 0; i < total; i++) {
    const svc = services[i];
    setBar(((i+1) / total) * 100);
    setStage(`找到 ${i+1} 個可用服務…`);
    addLog(i, svc.name);
    await new Promise(r => setTimeout(r, 120)); // 小延遲讓動畫看起來自然
    updateLog(i, 'ok', `✓ ${svc.name} — 可用`);
  }

  setBar(100, 'success');
  setStage(`已找到 ${total} 個下載服務 ✓`);

  // 顯示最佳服務的直接連結（自動開啟第一個）
  showDirectLinks(url, services);
  renderFallbacks(url);

  // 自動開啟最適合的服務
  window.open(services[0].fn(url), '_blank');

  running = false;
  document.getElementById('goBtn').disabled = false;
}

function showDirectLinks(url, services) {
  const area = document.getElementById('resultArea');
  const top3 = services.slice(0, 3);
  let html = `<div class="result-box">
    <div class="result-title">✦ 已自動開啟最佳服務，備選如下</div>`;
  top3.forEach(s => {
    html += `<a class="dl-link" href="${s.fn(url)}" target="_blank" rel="noopener">
      <div class="dl-icon">${s.icon}</div>
      <div class="dl-info">
        <div class="dl-name">${s.name}</div>
        <div class="dl-meta">點擊開啟此服務下載</div>
      </div>
      <div class="dl-btn-pill">開啟 ↗</div>
    </a>`;
  });
  html += `</div>`;
  area.innerHTML = html;
  area.className = 'result-area show';
}

// Input watchers
document.getElementById('urlInput').addEventListener('input', function() {
  const p = detectPlatform(this.value.trim());
  const pill = document.getElementById('platformPill');
  if (p && this.value.startsWith('http')) {
    document.getElementById('pEmoji').textContent = p.emoji;
    document.getElementById('pName').textContent = p.name;
    document.getElementById('pDesc').textContent = p.desc;
    pill.className = 'platform-pill show';
  } else { pill.className = 'platform-pill'; }
});
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startDownload();
});
document.getElementById('urlInput').addEventListener('paste', () => {
  setTimeout(() => {
    if (document.getElementById('urlInput').value.trim().startsWith('http')) startDownload();
  }, 80);
});
</script>
</body>
</html>
