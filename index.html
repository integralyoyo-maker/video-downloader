<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidDrop — 影片下載器</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --text: #f0eeff;
    --muted: #6b6880;
    --success: #4dffa6;
    --error: #ff6b6b;
    color-scheme: dark;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(124,107,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,107,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .bg-glow.g1 { background: var(--accent); top: -200px; left: -100px; }
  .bg-glow.g2 { background: var(--accent2); bottom: -200px; right: -100px; animation-delay: -6s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.8s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 48px;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.05em;
    font-weight: 300;
  }

  /* Platform badges */
  .platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
    animation: fadeUp 0.8s 0.15s ease both;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.8s 0.25s ease both;
    backdrop-filter: blur(10px);
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .url-input::placeholder { color: var(--muted); }
  .url-input:focus {
    border-color: var(--accent);
    background: rgba(124,107,255,0.06);
  }

  .dl-btn {
    background: linear-gradient(135deg, var(--accent), #9b56ff);
    border: none;
    border-radius: 12px;
    padding: 16px 28px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
    white-space: nowrap;
    box-shadow: 0 0 30px rgba(124,107,255,0.3);
  }

  .dl-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 40px rgba(124,107,255,0.45); }
  .dl-btn:active { transform: translateY(0); }
  .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Options */
  .options-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .select-wrap {
    position: relative;
    flex: 1;
    min-width: 140px;
  }

  .select-wrap label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    appearance: none;
    transition: border-color 0.2s;
  }
    select option {
    background-color: var(--surface);
    color: var(--text);
  }
  select:focus { border-color: var(--accent); }

  /* Status */
  .status-box {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 12px;
  }

  .status-box.show { display: flex; }
  .status-box.loading { background: rgba(124,107,255,0.08); border: 1px solid rgba(124,107,255,0.2); color: var(--accent); }
  .status-box.success { background: rgba(77,255,166,0.07); border: 1px solid rgba(77,255,166,0.2); color: var(--success); }
  .status-box.error { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.2); color: var(--error); }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(124,107,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-card {
    background: var(--surface);
    border: 1px solid rgba(77,255,166,0.15);
    border-radius: 20px;
    padding: 28px 32px;
    display: none;
    animation: fadeUp 0.4s ease both;
  }
  .result-card.show { display: block; }

  .result-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: background 0.2s;
  }
  .result-item:last-child { margin-bottom: 0; }
  .result-item:hover { background: rgba(255,255,255,0.05); }

  .result-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .download-link {
    background: linear-gradient(135deg, var(--accent), #9b56ff);
    color: #fff;
    text-decoration: none;
    padding: 9px 18px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .download-link:hover { opacity: 0.85; transform: translateY(-1px); }

  /* History */
  .history-section {
    margin-top: 32px;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .history-item:hover { border-color: rgba(124,107,255,0.3); background: rgba(124,107,255,0.04); }

  .history-url { flex: 1; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-platform { font-size: 10px; padding: 3px 8px; border-radius: 100px; border: 1px solid var(--border); color: var(--muted); flex-shrink: 0; }

  .clear-history {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    float: right;
    font-family: inherit;
  }
  .clear-history:hover { color: var(--error); }

  /* Tip box */
  .tip-box {
    margin-top: 24px;
    padding: 16px 20px;
    background: rgba(255,107,157,0.05);
    border: 1px solid rgba(255,107,157,0.15);
    border-radius: 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    animation: fadeUp 0.8s 0.5s ease both;
  }
  .tip-box strong { color: var(--accent2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .input-row { flex-direction: column; }
    .logo { font-size: 36px; }
    .container { padding: 40px 16px 60px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>

<div class="container">

  <div class="header">
    <div class="logo">VidDrop</div>
    <div class="tagline">貼上連結，一鍵下載任何平台的影片</div>
    <div class="platforms">
      <span class="badge">YouTube</span>
      <span class="badge">Instagram</span>
      <span class="badge">TikTok</span>
      <span class="badge">Facebook</span>
      <span class="badge">Threads</span>
      <span class="badge">Twitter / X</span>
      <span class="badge">Twitch</span>
      <span class="badge">Reddit</span>
      <span class="badge">Tumblr</span>
      <span class="badge">SoundCloud</span>
    </div>
  </div>

  <div class="card">
    <div class="input-row">
      <input 
        type="url" 
        class="url-input" 
        id="urlInput"
        placeholder="貼上影片連結... (YouTube, IG, TikTok, FB...)" 
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button class="dl-btn" id="dlBtn" onclick="fetchVideo()">下載</button>
    </div>

    <div class="options-row">
      <div class="select-wrap">
        <label>影片品質</label>
        <select id="qualitySelect">
          <option value="max">最高畫質</option>
          <option value="2160">4K (2160p)</option>
          <option value="1440">2K (1440p)</option>
          <option value="1080" selected>1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="360">360p</option>
        </select>
      </div>
      <div class="select-wrap">
        <label>格式</label>
        <select id="formatSelect">
          <option value="auto">自動選擇</option>
          <option value="mp4">MP4 影片</option>
          <option value="webm">WebM 影片</option>
          <option value="audio">僅音訊</option>
        </select>
      </div>
    </div>

    <div class="status-box" id="statusBox">
      <div class="spinner" id="spinner"></div>
      <span id="statusText"></span>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">✦ 下載連結已就緒</div>
    <div id="resultItems"></div>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="section-title">
      最近下載
      <button class="clear-history" onclick="clearHistory()">清除記錄</button>
    </div>
    <div id="historyList"></div>
  </div>

  <div class="tip-box">
    <strong>💡 說明：</strong>此工具透過 <strong>cobalt.tools</strong> 開放 API 運作，支援 10+ 個平台。
    下載連結由 cobalt 伺服器產生，請在連結失效前儘速下載。若遇到錯誤，可嘗試更換品質設定後重試。
    <br><br>
    <strong>⚠️ 注意：</strong>Facebook 私人影片、限時動態可能無法下載。YouTube 需注意版權，請僅下載有權使用的內容。
  </div>
</div>

<script>
const COBALT_API = 'https://cobalt.api.wuk.sh';

let history = JSON.parse(localStorage.getItem('viddrop_history') || '[]');

function detectPlatform(url) {
  if (/youtube\.com|youtu\.be/.test(url)) return 'YouTube';
  if (/instagram\.com/.test(url)) return 'Instagram';
  if (/tiktok\.com/.test(url)) return 'TikTok';
  if (/facebook\.com|fb\.watch/.test(url)) return 'Facebook';
  if (/threads\.net/.test(url)) return 'Threads';
  if (/twitter\.com|x\.com/.test(url)) return 'Twitter/X';
  if (/twitch\.tv/.test(url)) return 'Twitch';
  if (/reddit\.com/.test(url)) return 'Reddit';
  if (/tumblr\.com/.test(url)) return 'Tumblr';
  if (/soundcloud\.com/.test(url)) return 'SoundCloud';
  return '未知平台';
}

function platformEmoji(platform) {
  const map = {
    'YouTube': '🎬', 'Instagram': '📸', 'TikTok': '🎵',
    'Facebook': '📘', 'Threads': '🧵', 'Twitter/X': '🐦',
    'Twitch': '🟣', 'Reddit': '🔴', 'Tumblr': '💙', 'SoundCloud': '🎧'
  };
  return map[platform] || '🎥';
}

function setStatus(type, msg) {
  const box = document.getElementById('statusBox');
  const text = document.getElementById('statusText');
  const spinner = document.getElementById('spinner');
  
  box.className = 'status-box show ' + type;
  text.textContent = msg;
  spinner.style.display = type === 'loading' ? 'block' : 'none';
  
  if (type !== 'loading') {
    setTimeout(() => { if (box.className.includes(type)) box.className = 'status-box'; }, 5000);
  }
}

function hideStatus() {
  document.getElementById('statusBox').className = 'status-box';
}

async function fetchVideo() {
  const url = document.getElementById('urlInput').value.trim();
  const quality = document.getElementById('qualitySelect').value;
  const format = document.getElementById('formatSelect').value;
  const btn = document.getElementById('dlBtn');

  if (!url) { setStatus('error', '請先貼上影片連結'); return; }

  try { new URL(url); } catch { setStatus('error', '連結格式不正確'); return; }

  btn.disabled = true;
  document.getElementById('resultCard').className = 'result-card';
  setStatus('loading', '正在解析影片連結...');

  const requestBody = { url };
  
  if (quality !== 'auto' && format !== 'audio') requestBody.videoQuality = quality;
  if (format === 'audio') { requestBody.downloadMode = 'audio'; }
  else if (format !== 'auto') { requestBody.videoCodec = format === 'webm' ? 'vp9' : 'h264'; }

  try {
    const res = await fetch(COBALT_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(requestBody)
    });

    const data = await res.json();

    if (data.status === 'error') {
      throw new Error(data.error?.code || '解析失敗，請確認連結是否正確');
    }

    hideStatus();
    showResults(data, url, detectPlatform(url));
    addHistory(url);

  } catch (err) {
    let msg = '下載失敗：';
    if (err.message.includes('fetch')) msg += 'API 連線失敗，請確認網路或稍後再試';
    else if (err.message.includes('error.link.unsupported')) msg += '此連結格式不支援';
    else if (err.message.includes('error.api.auth')) msg += '需要登入才能下載私人內容';
    else msg += err.message;
    setStatus('error', msg);
  } finally {
    btn.disabled = false;
  }
}

function showResults(data, originalUrl, platform) {
  const card = document.getElementById('resultCard');
  const items = document.getElementById('resultItems');
  items.innerHTML = '';

  if (data.status === 'stream' || data.status === 'redirect') {
    // Single file
    const item = createResultItem({
      name: `${platform} 影片`,
      meta: '點擊下方按鈕下載',
      url: data.url,
      platform
    });
    items.appendChild(item);

  } else if (data.status === 'picker') {
    // Multiple files (e.g., Instagram carousel)
    data.picker.forEach((pick, i) => {
      const item = createResultItem({
        name: `${platform} 媒體 ${i+1}`,
        meta: pick.type || '影片/圖片',
        url: pick.url,
        platform,
        thumb: pick.thumb
      });
      items.appendChild(item);
    });

    if (data.audio) {
      const audioItem = createResultItem({
        name: '背景音樂',
        meta: '音訊檔案',
        url: data.audio,
        platform: 'audio'
      });
      items.appendChild(audioItem);
    }
  }

  card.className = 'result-card show';
}

function createResultItem({ name, meta, url, platform, thumb }) {
  const div = document.createElement('div');
  div.className = 'result-item';

  const iconBg = {
    'YouTube': '#ff0000', 'Instagram': '#e1306c', 'TikTok': '#000',
    'Facebook': '#1877f2', 'Threads': '#000', 'Twitter/X': '#1da1f2',
    'audio': '#f97316'
  }[platform] || '#7c6bff';

  div.innerHTML = `
    <div class="result-icon" style="background:${iconBg}20; color:${iconBg}">
      ${thumb ? `<img src="${thumb}" style="width:36px;height:36px;object-fit:cover;border-radius:8px">` : platformEmoji(platform)}
    </div>
    <div class="result-info">
      <div class="result-name">${name}</div>
      <div class="result-meta">${meta}</div>
    </div>
    <a href="${url}" class="download-link" target="_blank" rel="noopener" download>下載</a>
  `;
  return div;
}

function addHistory(url) {
  const platform = detectPlatform(url);
  history = [{ url, platform, time: Date.now() }, ...history.filter(h => h.url !== url)].slice(0, 10);
  localStorage.setItem('viddrop_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  
  if (history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  
  list.innerHTML = history.map(h => `
    <div class="history-item" onclick="loadHistory('${h.url.replace(/'/g,"\\'")}')">
      <span>${platformEmoji(h.platform)}</span>
      <span class="history-url">${h.url}</span>
      <span class="history-platform">${h.platform}</span>
    </div>
  `).join('');
}

function loadHistory(url) {
  document.getElementById('urlInput').value = url;
  document.getElementById('urlInput').focus();
}

function clearHistory() {
  history = [];
  localStorage.removeItem('viddrop_history');
  renderHistory();
}

// Enter key support
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchVideo();
});

// Paste detection
document.getElementById('urlInput').addEventListener('paste', () => {
  setTimeout(() => {
    const val = document.getElementById('urlInput').value;
    if (val.startsWith('http')) fetchVideo();
  }, 50);
});

// Init
renderHistory();
</script>
</body>
</html>
